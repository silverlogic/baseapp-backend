id: python-typing-required
valid:
  - |
    def add(a: int, b: int) -> int:
        return a + b
  - |
    def notify(user: "User") -> None:
        ...
  - |
    class Foo:
        def bar(self) -> "Foo":
            return self
invalid:
  - |
    def add(a, b):
        return a + b
  - |
    def typed_args_only(a: int, b: int):
        return a + b
  - |
    class Foo:
        def bar(self):
            return self
