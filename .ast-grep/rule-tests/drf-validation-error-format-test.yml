id: drf-validation-error-format
valid:
  - |
    raise serializers.ValidationError({"email": [_("This email is already in use.")]})
  - |
    raise serializers.ValidationError({"non_field_errors": [_("Order total exceeds limit.")]})
invalid:
  - |
    raise serializers.ValidationError("This email is already in use.")
  - |
    raise serializers.ValidationError(_("This email is already in use."))
  - |
    raise ValidationError("This email is already in use.")
  - |
    raise exceptions.ValidationError(_("This email is already in use."))
  - |
    raise serializers.ValidationError({"email": "not wrapped in a list"})
  - |
    raise serializers.ValidationError({"email": _("not wrapped in a list")})
