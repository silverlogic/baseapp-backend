id: django-admin-use-unfold
language: Python
severity: error
message: "Subclass `unfold.admin.ModelAdmin` / `unfold.admin.TabularInline` / `unfold.admin.StackedInline` — never the stock `django.contrib.admin` versions; they render unstyled and break the admin UI. See .claude/skills/backend-conventions/references/admin.md"
# Project code only: baseapp_* packages intentionally register stock admins
# that consuming projects unregister and re-register with Unfold.
files:
  - "apps/**"
ignores:
  - "**/migrations/**"
rule:
  any:
    - kind: class_definition
      has:
        field: superclasses
        has:
          any:
            - pattern: admin.ModelAdmin
            - pattern: admin.TabularInline
            - pattern: admin.StackedInline
            - pattern: django.contrib.admin.ModelAdmin
    - kind: import_from_statement
      all:
        - has:
            field: module_name
            regex: ^django\.contrib\.admin$
        - has:
            kind: dotted_name
            regex: ^(ModelAdmin|TabularInline|StackedInline)$
