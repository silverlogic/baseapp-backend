id: graphql-use-django-object-type
language: Python
severity: error
message: "ObjectTypes must use `baseapp_core.graphql.DjangoObjectType` (project optimizer + connection conventions), not `graphene_django`'s. See .claude/skills/backend-conventions/references/graphql-file-layout.md"
ignores:
  - "**/migrations/**"
rule:
  any:
    - kind: import_from_statement
      all:
        - has:
            field: module_name
            regex: ^graphene_django(\.types)?$
        - has:
            stopBy: end
            kind: dotted_name
            regex: ^DjangoObjectType$
    - pattern: graphene_django.DjangoObjectType
    - pattern: graphene_django.types.DjangoObjectType
