id: exception-handling-without-logging
language: Python
severity: warning
message: "Broad `except Exception` must log with `logger.exception(...)` (or re-raise) and return a generic message — never swallow silently or leak exception details to the caller. See .claude/skills/backend-conventions/references/error-shape.md"
ignores:
  - "**/migrations/**"
rule:
  kind: except_clause
  all:
    - any:
        - has:
            pattern: Exception
        - has:
            kind: as_pattern
            has:
              pattern: Exception
    - not:
        has:
          stopBy: end
          any:
            - pattern: logger.exception($$$)
            - pattern: logger.error($$$)
            - pattern: logging.exception($$$)
            - pattern: logging.error($$$)
            - pattern: self.logger.exception($$$)
            - pattern: self.logger.error($$$)
            - kind: raise_statement
