name: Reactions Workflow

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

jobs:
  common-workflow:
    uses: ./project-workflow.yml

#    permissions:
#      id-token: write

  reaction-workflow:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.8" ]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
